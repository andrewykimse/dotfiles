# ~/.tmux.conf

# --- Core Settings ---

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Eliminate escape delay (important for vim/neovim)
set -sg escape-time 0

# Bigger scrollback buffer
set -g history-limit 50000

# Set the leader key (prefix) to Ctrl+a
# This overrides the default Ctrl+b
set -g prefix C-a
unbind C-b # Unbind the default prefix key

# Set the status bar to appear at the bottom
set -g status-position bottom

# Enable mouse support for easier navigation and resizing
set -g mouse on

# Set window and pane indices to start from 1
set -g base-index 1
setw -g pane-base-index 1

# --- Keybindings for Window and Pane Management ---

# Reload tmux config
bind r source-file ~/.tmux.conf \; display "TMUX Config Reloaded!"

# Create new windows in current directory
bind c new-window -c "#{pane_current_path}"

# --- Pane Navigation (vim-tmux-navigator) ---
# Seamless navigation between tmux panes and Neovim splits using Ctrl+h/j/k/l
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Navigate panes using Ctrl+a + arrow keys (fallback)
bind -r Left  select-pane -L
bind -r Right select-pane -R
bind -r Up    select-pane -U
bind -r Down  select-pane -D


# --- Pane Resizing (using Ctrl+a + Modifier + Arrow Keys) ---
# We'll use Shift + Arrow keys for resizing, which is standard and unambiguous.

# Resize panes with Shift + Arrow keys
bind -r S-Left  resize-pane -L 5 # Resize pane left by 5 cells
bind -r S-Right resize-pane -R 5 # Resize pane right by 5 cells
bind -r S-Up    resize-pane -U 5 # Resize pane up by 5 cells
bind -r S-Down  resize-pane -D 5 # Resize pane down by 5 cells

# If you prefer to use Vim-style resizing keys (e.g., prefix + Ctrl+h for resizing left)
# You would need to bind those differently and ensure no conflicts.
# The Shift+Arrow keys are generally more intuitive and less prone to conflict.

# --- Pane Splitting (Unambiguous Keys) ---
# We'll use '%' for vertical splits (left/right) and '"' for horizontal splits (top/bottom).
# These are the default tmux keys for splitting, and are less likely to conflict.

# Vertical split: Ctrl+a + %
# bind % split-window -h # This is the default, so no need to explicitly bind usually.

# Horizontal split: Ctrl+a + "
# bind '"' split-window -v # This is the default, so no need to explicitly bind usually.

# If you *really* want to bind them to something else, use keys that don't conflict.
# For example:
# bind | split-window -h    # Ctrl+a + | for vertical split (left/right)
# bind - split-window -v   # Ctrl+a + - for horizontal split (top/bottom)

# For this configuration, we'll stick to the default '%' and '"' for splitting.

# --- Initial Layout for Development (Code Editor | Terminal / Claude) ---
# This section defines how your panes are arranged when you first start a session.
# We'll create a vertical split, then a horizontal split in the right pane.

# Bind 'v' to create a vertical split (left/right) in current directory
bind v split-window -h -c "#{pane_current_path}"

# Bind 'h' to create a horizontal split (top/bottom) in current directory
bind h split-window -v -c "#{pane_current_path}"

# The actual layout will be achieved by manually executing these splits.
# You can then set a layout if you want a specific initial arrangement.
# For example, to set a default layout:
# select-layout -o main-vertical # This is a predefined layout that is similar

# However, for manual control, we'll rely on the bind commands above.

# --- Copy Mode (vim-style) ---
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# --- Status Bar Configuration ---
set -g status-bg colour235 # Dark grey background
set -g status-fg colour137 # Light yellow foreground
# set -g status-left-bg colour234 # Slightly darker grey for left status
# set -g status-left-fg colour160 # Red for left status

# Format for the left side of the status bar (session name)
set -g status-left '#[fg=colour160]#[bold]#[fg=colour231] #S #[fg=colour160]#[normal]'

# Format for the right side of the status bar (time and date)
set -g status-right '#[fg=colour137]#[bold] %a, %d %b %Y %H:%M:%S #[fg=colour137]#[normal]'

# Highlight the current window
setw -g window-status-current-style 'fg=colour231,bg=colour238,bold'
setw -g window-status-current-format '#[fg=colour231,bg=colour238,bold] #I:#W #[fg=colour231,bg=colour238,bold]'

# Style for inactive windows
setw -g window-status-style 'fg=colour244,bg=colour235'
setw -g window-status-format '#[fg=colour244,bg=colour235] #I:#W #[fg=colour244,bg=colour235]'

# Border colors
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour160'

# Find keywords in all files in the current directory and subdirectories (opens in NEW window)
bind / command-prompt "pipe-pane 'rg --color=always --line-number --no-heading --smart-case \"%%\" | fzf --ansi --delimiter ':' --nth 1,2 --header \"Search results\" --preview '' --bind \"enter:execute-silent(tmux new-window -n '{2}:{1}' \\\"vim +{2} {1}\\\")\" '"
# --- Optional: Auto-rename windows ---
# set -g set-titles on
# set -g set-titles-string '#S:#I:#W'

# --- Optional: Default shell ---
# set-option -g default-shell /bin/zsh
